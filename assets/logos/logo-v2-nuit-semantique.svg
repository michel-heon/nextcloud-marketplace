<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <!-- Gradient pour le nuage bleu sur fond sombre -->
    <linearGradient id="cloudGrad2" x1="0%" y1="0%" x2="100%" y2="60%">
      <stop offset="0%" stop-color="#0082C9"/>
      <stop offset="100%" stop-color="#1CAFFF"/>
    </linearGradient>

    <!-- Masque de découpe = forme du nuage (pour le graphe sémantique) -->
    <clipPath id="cloudClip2">
      <circle cx="107" cy="126" r="28"/>
      <circle cx="140" cy="102" r="38"/>
      <circle cx="173" cy="126" r="28"/>
      <rect x="79" y="126" width="122" height="28"/>
    </clipPath>
  </defs>

  <!-- Fond sombre — nuit sémantique -->
  <rect width="280" height="280" fill="#0A1628" rx="18"/>

  <g transform="translate(140 140) scale(1.12) translate(-140 -140)">

  <!-- Nuage rempli du gradient Nextcloud -->
  <g fill="url(#cloudGrad2)">
    <circle cx="107" cy="126" r="28"/>
    <circle cx="140" cy="102" r="38"/>
    <circle cx="173" cy="126" r="28"/>
    <rect x="79" y="126" width="122" height="28"/>
  </g>

  <!-- Graphe de connaissance DANS le nuage (web sémantique, emblème Cotechnoe) -->
  <g clip-path="url(#cloudClip2)">
    <!-- Arêtes du graphe sémantique en blanc semi-transparent -->
    <g stroke="rgba(255,255,255,0.55)" stroke-width="1.6" fill="none">
      <line x1="116" y1="100" x2="140" y2="84"/>  <!-- N1–N2 -->
      <line x1="140" y1="84"  x2="163" y2="100"/> <!-- N2–N3 -->
      <line x1="116" y1="100" x2="140" y2="112"/> <!-- N1–N7 -->
      <line x1="140" y1="84"  x2="140" y2="112"/> <!-- N2–N7 -->
      <line x1="163" y1="100" x2="140" y2="112"/> <!-- N3–N7 -->
      <line x1="140" y1="112" x2="108" y2="130"/> <!-- N7–N4 -->
      <line x1="140" y1="112" x2="140" y2="138"/> <!-- N7–N5 -->
      <line x1="140" y1="112" x2="172" y2="128"/> <!-- N7–N6 -->
      <line x1="116" y1="100" x2="108" y2="130"/> <!-- N1–N4 -->
      <line x1="163" y1="100" x2="172" y2="128"/> <!-- N3–N6 -->
    </g>

    <!-- Noeuds du graphe : blanc plein -->
    <g fill="white">
      <circle cx="116" cy="100" r="5"/>  <!-- N1 -->
      <circle cx="140" cy="84"  r="5"/>  <!-- N2 -->
      <circle cx="163" cy="100" r="5"/>  <!-- N3 -->
      <circle cx="108" cy="130" r="5"/>  <!-- N4 -->
      <circle cx="140" cy="138" r="5"/>  <!-- N5 -->
      <circle cx="172" cy="128" r="5"/>  <!-- N6 -->
    </g>

    <!-- Noeud central N7 — plus grand, ambré (Cotechnoe accent) -->
    <circle cx="140" cy="112" r="6.5" fill="#F5A623"/>
  </g>

  <!-- Nom "Cotechnoe" — blanc bold -->
  <text
    x="140" y="202"
    text-anchor="middle"
    font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="25"
    fill="white"
    letter-spacing="0.3">Cotechnoe</text>

  </g>
</svg>
