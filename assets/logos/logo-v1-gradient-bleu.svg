<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <!-- Gradient de fond : bleu Nextcloud diagonal -->
    <linearGradient id="bgGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0082C9"/>
      <stop offset="100%" stop-color="#1CAFFF"/>
    </linearGradient>
  </defs>

  <!-- Fond arrondi en gradient Nextcloud -->
  <rect width="280" height="280" fill="url(#bgGrad1)" rx="18"/>

  <g transform="translate(140 140) scale(1.35) translate(-140 -140)">

  <!-- Nuage blanc (forme Nextcloud-inspirée via cercles superposés) -->
  <g fill="white">
    <circle cx="107" cy="126" r="28"/>
    <circle cx="140" cy="102" r="38"/>
    <circle cx="173" cy="126" r="28"/>
    <rect x="79" y="126" width="122" height="28"/>
  </g>

  <!-- Hexagone Cotechnoe (emblème abeille/ruche) en ambre/or sur le nuage -->
  <!-- Centre (140, 112), rayon 20 — flat-top hexagon -->
  <polygon
    points="157.3,102 140,92 122.7,102 122.7,122 140,132 157.3,122"
    fill="none"
    stroke="#F5A623"
    stroke-width="2.8"
    stroke-linejoin="round"
    opacity="0.88"/>

  <!-- Point central de la ruche -->
  <circle cx="140" cy="112" r="3.5" fill="#F5A623" opacity="0.88"/>

  <!-- Nom "Cotechnoe" — typographie Inter bold, blanc -->
  <text
    x="140" y="202"
    text-anchor="middle"
    font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="30"
    fill="white"
    letter-spacing="0.3">Cloud Hub</text>

  </g>
</svg>
