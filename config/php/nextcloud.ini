; config/php/nextcloud.ini
; PHP-FPM and CLI override settings for Nextcloud Hub 31+
; Deployed to /etc/php/8.3/fpm/conf.d/99-nextcloud.ini
; and        /etc/php/8.3/cli/conf.d/99-nextcloud.ini

[PHP]
; Memory
memory_limit = 512M

; File upload limits (support large files)
upload_max_filesize = 16G
post_max_size       = 16G

; Execution time (needed for long background jobs)
max_execution_time = 3600
max_input_time     = 3600

; Output buffering must be disabled for Nextcloud
output_buffering = 0

; Default charset
default_charset = UTF-8

; Date/time (UTC on the server; Nextcloud handles user timezones)
date.timezone = UTC

[opcache]
opcache.enable                = 1
opcache.enable_cli            = 1
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.memory_consumption    = 128
opcache.revalidate_freq       = 1
; Required by Nextcloud (reads docblock annotations)
opcache.save_comments         = 1
opcache.jit_buffer_size       = 128M
opcache.jit                   = 1255

[apcu]
apc.enable_cli = 1
