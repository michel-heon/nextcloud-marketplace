; config/php/www.conf
; PHP-FPM pool configuration for Nextcloud
; Deployed to /etc/php/8.3/fpm/pool.d/www.conf

[www]
user  = www-data
group = www-data

; Unix socket — matches the fastcgi_pass in NGINX config
listen            = /run/php/php8.3-fpm.sock
listen.owner      = www-data
listen.group      = www-data
listen.mode       = 0660
listen.backlog    = 511

; Dynamic process manager
pm                    = dynamic
pm.max_children       = 20
pm.start_servers      = 5
pm.min_spare_servers  = 3
pm.max_spare_servers  = 10
pm.max_requests       = 500
pm.process_idle_timeout = 10s

; Status and ping pages (accessible from localhost only — for monitoring)
pm.status_path = /fpm-status
ping.path      = /fpm-ping
ping.response  = pong

; Logging
access.log = /var/log/php8.3-fpm.www.access.log
slowlog    = /var/log/php8.3-fpm.www.slow.log
request_slowlog_timeout = 10s

php_admin_value[error_log]    = /var/log/php8.3-fpm.www.log
php_admin_flag[log_errors]    = on
php_admin_value[memory_limit] = 512M

; Environment variables passed to PHP workers
env[HOSTNAME] = $HOSTNAME
env[PATH]     = /usr/local/bin:/usr/bin:/bin
env[TMP]      = /tmp
env[TMPDIR]   = /tmp
env[TEMP]     = /tmp

; Nextcloud-required PHP session settings
php_value[session.save_handler] = files
php_value[session.save_path]    = /var/lib/php/sessions
php_value[soap.wsdl_cache_dir]  = /var/lib/php/wsdlcache
