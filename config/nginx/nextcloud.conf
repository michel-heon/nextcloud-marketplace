# config/nginx/nextcloud.conf
# NGINX vhost configuration for Nextcloud Hub 31+
# HTTP redirects to HTTPS; placeholder SSL cert is replaced by Let's Encrypt at first boot.

# PHP-FPM upstream socket
upstream php-handler {
    server unix:/run/php/php8.3-fpm.sock;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name _;
    server_tokens off;

    # Allow Let's Encrypt ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Nextcloud
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;
    server_tokens off;

    root /var/www/nextcloud;
    index index.php index.html;

    # --- SSL ---
    ssl_certificate     /etc/ssl/nextcloud/placeholder.crt;
    ssl_certificate_key /etc/ssl/nextcloud/placeholder.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "no-referrer"                                  always;
    add_header Permissions-Policy        "camera=(),microphone=(),geolocation=()"       always;

    # --- Nextcloud-specific restrictions ---
    # Deny access to sensitive directories
    location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)(?:$|/) {
        deny all;
        return 404;
    }

    location ~ ^/(?:\.|autotest|occ|issue|indie|db_|console) {
        deny all;
        return 404;
    }

    # WebDAV / CalDAV / CardDAV well-known redirects
    location = /.well-known/carddav {
        return 301 $scheme://$host/remote.php/dav;
    }
    location = /.well-known/caldav {
        return 301 $scheme://$host/remote.php/dav;
    }
    location ^~ /.well-known {
        return 301 $scheme://$host/index.php$uri;
    }

    # Favicon and robots — no logging
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { allow all; access_log off; log_not_found off; }

    # PHP — doit être déclaré AVANT le bloc static assets.
    # Le bloc CSS utilise `try_files $uri /index.php$request_uri` ; le fallback
    # /index.php/apps/theming/theme/default.css contient .php/ et est donc capturé
    # ici en priorité (regex déclarée en premier). Si ce bloc était après le CSS,
    # nginx re-capturerait le fallback en .css et créerait une boucle infinie.
    location ~ \.php(?:$|/) {
        # Redirige les fichiers PHP non-front-controller vers index.php (support legacy)
        rewrite ^/(?!index|remote|public|cron|core/ajax/update|status|ocs/v[12]|updater/.+|oc[ms]-provider/.+) /index.php$request_uri;

        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        set $path_info $fastcgi_path_info;

        try_files $fastcgi_script_name =404;

        include        fastcgi_params;
        fastcgi_pass   php-handler;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO       $path_info;
        fastcgi_param  modHeadersAvailable true;
        fastcgi_param  front_controller_active true;
        fastcgi_read_timeout 1800;

        fastcgi_intercept_errors on;
        fastcgi_request_buffering off;
    }

    # Static asset caching
    # try_files requis : les assets générés par PHP (theming CSS, etc.) n'existent pas
    # sur disque. Le fallback /index.php$request_uri produit une URI en .php/ qui est
    # capturée par le bloc PHP ci-dessus — pas de boucle infinie.
    location ~* \.(?:css|js|svg|gif|png|ico|woff2?)$ {
        try_files $uri /index.php$request_uri;
        expires 6M;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Push API (Nextcloud Notify Push)
    location ^~ /push/ {
        proxy_pass http://127.0.0.1:7867/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        rewrite ^/remote/(.*) /remote.php last;
        try_files $uri /index.php$request_uri;
    }

    # Upload size
    client_max_body_size 16G;
    fastcgi_buffers      64 4K;

    # Gzip
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_proxied    expired no-cache no-store private no_last_modified no_etag auth;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.geo+json
        application/x-font-ttf
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;
}
