# config/redis/redis-nextcloud.conf
# Redis configuration for Nextcloud session and object caching
# Deployed to /etc/redis/redis.conf

# Listen on loopback only — no external Redis access
bind 127.0.0.1
port 6379
protected-mode yes

# Password set at first boot by nc-first-boot.sh
requirepass PLACEHOLDER_REDIS_PASSWORD

# Maximum memory for Nextcloud cache
maxmemory 256mb

# Eviction policy: remove least-recently-used keys when maxmemory is hit
maxmemory-policy allkeys-lru

# Disable RDB snapshots (Nextcloud cache is ephemeral)
save ""
rdbchecksum no

# AOF disabled (cache does not need persistence)
appendonly no

# Logging
loglevel notice
logfile /var/log/redis/redis-server.log

# Daemonize via systemd (not self-fork)
daemonize no

# Connection timeouts
tcp-backlog        511
timeout            300
tcp-keepalive      300

# Latency monitoring for slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Limit max number of connected clients
maxclients 128
